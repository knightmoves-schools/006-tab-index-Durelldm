<html>

<head>

    <title>Tabindex Form Example</title>

</head>

<body>



<h2>Contact Form</h2>



<form>

    <label for="name">Name:</label><br>

    <input type="text" id="name" tabindex="1"><br><br>



    <label for="email">Email:</label><br>

    <input type="email" id="email" tabindex="2"><br><br>



    <label for="phone">Phone:</label><br>

    <input type="tel" id="phone" tabindex="3"><br><br>



    <label for="message">Message:</label><br>

    <textarea id="message" tabindex="4"></textarea><br><br>



    <button type="submit" tabindex="5">Submit</button>

</form>



</body>

</html>
