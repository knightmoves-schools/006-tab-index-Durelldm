<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Tabindex Form Example</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            padding: 20px;

        }

        form {

            max-width: 400px;

        }

        label {

            display: block;

            margin-top: 10px;

        }

        input, button {

            width: 100%;

            padding: 8px;

            margin-top: 5px;

        }

    </style>

</head>

<body>



    <h2>Registration Form (Tabindex Example)</h2>



    <form>

        <label for="name">Full Name</label>

        <input type="text" id="name" tabindex="1">



        <label for="email">Email</label>

        <input type="email" id="email" tabindex="2">



        <label for="phone">Phone</label>

        <input type="tel" id="phone" tabindex="3">



        <label for="password">Password</label>

        <input type="password" id="password" tabindex="4">



        <label for="confirm">Confirm Password</label>

        <input type="password" id="confirm" tabindex="5">



        <button type="submit" tabindex="6">Submit</button>

        <button type="reset" tabindex="7">Reset</button>

    </form>



</body>

</html>
