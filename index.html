<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Tabindex Form Example</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            margin: 40px;

        }

        form {

            width: 300px;

        }

        input, select, textarea, button {

            width: 100%;

            margin-bottom: 10px;

            padding: 8px;

        }

    </style>

</head>

<body>



    <h2>Registration Form (Tabindex Example)</h2>



    <form>



        <label for="fname">First Name:</label>

        <input type="text" id="fname" name="fname" tabindex="1">



        <label for="lname">Last Name:</label>

        <input type="text" id="lname" name="lname" tabindex="2">



        <label for="email">Email:</label>

        <input type="email" id="email" name="email" tabindex="3">



 

        <label for="phone">Phone:</label>

        <input type="tel" id="phone" name="phone" tabindex="4">



        <label for="gender">Gender:</label>

        <select id="gender" name="gender" tabindex="5">

            <option value="">Select</option>

            <option value="male">Male</option>

            <option value="female">Female</option>

        </select>



        <label for="message">Message:</label>

        <textarea id="message" name="message" rows="4" tabindex="6"></textarea>



        <label>

            <input type="checkbox" name="subscribe" tabindex="7"> Subscribe to newsletter

        </label>



        <button type="submit" tabindex="8">Submit</button>



        <button type="reset" tabindex="9">Reset</button>

    </form>



</body>

</html>
