<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Tabindex Form Example</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            padding: 20px;

        }

        form {

            max-width: 400px;

        }

        input, select, textarea, button {

            display: block;

            margin-bottom: 10px;

            padding: 8px;

            width: 100%;

        }

    </style>

</head>

<body>



<h2>Registration Form (Custom Tab Order)</h2>



<form>

   

    <label for="name">Full Name:</label>

    <input type="text" id="name" tabindex="1" placeholder="Enter your name">



    <label for="email">Email:</label>

    <input type="email" id="email" tabindex="2" placeholder="Enter your email">



    <label for="phone">Phone:</label>

    <input type="tel" id="phone" tabindex="3" placeholder="Enter your phone number">



    <label for="country">Country:</label>

    <select id="country" tabindex="4">

        <option value="">Select Country</option>

        <option>USA</option>

        <option>Canada</option>

        <option>UK</option>

    </select>



    <label for="message">Message:</label>

    <textarea id="message" tabindex="5" placeholder="Write something..."></textarea>



    <input type="text" value="Skipped Field" tabindex="-1">



    <button type="submit" tabindex="6">Submit</button>

</form>



</body>

</html>
