<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Tabindex Form Example</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            padding: 20px;

        }

        form {

            max-width: 400px;

        }

        input, select, textarea, button {

            display: block;

            width: 100%;

            margin-bottom: 15px;

            padding: 8px;

        }

    </style>

</head>

<body>



    <h2>Registration Form</h2>



    <form>

        <label for="name">Full Name:</label>

        <input type="text" id="name" name="name" tabindex="1">



        <label for="email">Email:</label>

        <input type="email" id="email" name="email" tabindex="2">



        <label for="password">Password:</label>

        <input type="password" id="password" name="password" tabindex="3">



        <label for="phone">Phone:</label>

        <input type="tel" id="phone" name="phone" tabindex="4">



        <label for="gender">Gender:</label>

        <select id="gender" name="gender" tabindex="5">

            <option value="">Select</option>

            <option value="male">Male</option>

            <option value="female">Female</option>

        </select>



        <label for="message">Message:</label>

        <textarea id="message" name="message" tabindex="6"></textarea>



        <button type="submit" tabindex="7">Submit</button>

        <button type="reset" tabindex="8">Reset</button>

    </form>



</body>

</html>
